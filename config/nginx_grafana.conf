# Nginx configuration for Grafana Reverse Proxy with HTTPS
# Domain: dashboards.kliksimpus.com
# Pointing to: localhost:3000

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# HTTP Redirect to HTTPS
server {
  listen 80;
  server_name dashboards.kliksimpus.com;
  return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
  listen 443 ssl;
  server_name dashboards.kliksimpus.com;

  # SSL Certificate Paths (Adjust if using Let's Encrypt / Certbot)
  ssl_certificate     /etc/letsencrypt/live/dashboards.kliksimpus.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dashboards.kliksimpus.com/privkey.pem;

  # Standard SSL Optimizations
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;

  location / {
    proxy_set_header Host $http_host;
    proxy_pass http://localhost:3000;
  }

  # Proxy Grafana Live WebSocket connections.
  location /api/live/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_pass http://localhost:3000;
  }
}
