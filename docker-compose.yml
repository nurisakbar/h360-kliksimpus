services:
  grafana:
    image: simpledotorg/heart360tk-grafana:${HEART360TK_VERSION}
    platform: linux/amd64
    container_name: grafana
    expose:
      - 3000
    restart: unless-stopped
    environment:
      - GF_DATABASE_URL=postgres://grafana:ZDI5MGE3YmYyMTRlNGNmYThkMTYyZjk3@postgres:5432/${POSTGRES_DB}
      - GF_SECURITY_ADMIN_PASSWORD=your_secure_password
      - GF_SERVER_DOMAIN=dashboards.${DOMAIN_NAME}
      - GF_SERVER_ROOT_URL=https://dashboards.${DOMAIN_NAME}
      - VIRTUAL_HOST=dashboards.${DOMAIN_NAME}
      - LETSENCRYPT_HOST=dashboards.${DOMAIN_NAME}
      - LETSENCRYPT_EMAIL=${EMAIL}

  postgres:
    image: simpledotorg/heart360tk-postgresql:${HEART360TK_VERSION}
    platform: linux/amd64
    container_name: postgres
    ports:
      - 5432:5432
    restart: unless-stopped
    volumes:
      - ./.database:/var/lib/postgresql/data # Data disimpan di direktori .database di host (persistent)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"]
      interval: 5s
      timeout: 60s
      retries: 5
      start_period: 80s

  file-processor:
    image: simpledotorg/heart360tk-fileprocessor:${HEART360TK_VERSION}
    platform: linux/amd64
    container_name: file-upload-trigger
    environment:
      - H360TK_DATA_LOAD_SCRIPT=/scripts/ingest_file_h360tk.py
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=heart360tk
      - POSTGRES_PASSWORD=YmE4ZTk0OGI0OTNmNGU5YmFjZDY1YTA0
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./ingest_file_h360tk.py:/scripts/ingest_file_h360tk.py
      - .upload:/data:rw

  filebrowser:
    image: gtstef/filebrowser:stable-slim
    container_name: filebrowser-quantum
    restart: unless-stopped
    expose:
      - 80
    volumes:
      - .upload:/srv:rw
    environment:
      - FILEBROWSER_ADMIN_PASSWORD=admin
      - FILEBROWSER_BASEURL=/
      - VIRTUAL_HOST=upload.${DOMAIN_NAME}
      - LETSENCRYPT_HOST=upload.${DOMAIN_NAME}
      - LETSENCRYPT_EMAIL=${EMAIL}

  sftpgo:
    build:
      context: .
      dockerfile: Dockerfile.sftpgo
      args:
        INGEST_SCRIPT_PATH: /scripts/ingest_file_h360tk.py
    image: h360tk-sftpgo:local
    container_name: sftpgo
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      - postgres
    ports:
      - "8090:8080"
      - "2022:2022"
      - "2121:2121"
      - "50000-50100:50000-50100"
    volumes:
      - ./loaddata.json:/etc/sftpgo/init/loaddata.json
      - .upload:/srv/sftpgo/data/webuser:rw
      - ./config/sftpgo-ingest.env:/etc/sftpgo/ingest.env:ro
      - ./logs/sftpgo-ingest:/var/log/sftpgo-ingest:rw
      - ./scripts/sftpgo_ingest_hook.sh:/usr/local/bin/sftpgo_ingest_hook.sh:ro
      - ./ingest_file_h360tk.py:/scripts/ingest_file_h360tk.py:ro
    environment:
      - SFTPGO_HTTPD__BINDINGS__0__PORT=8080
      - SFTPGO_FTPD__BINDINGS__0__PORT=2121
      - SFTPGO_FTPD__BINDINGS__0__FORCE_PASSIVE_IP=${FTP_PASSIVE_IP:-127.0.0.1}
      - SFTPGO_FTPD__PASSIVE_PORT_RANGE__START=50000
      - SFTPGO_FTPD__PASSIVE_PORT_RANGE__END=50100
      - SFTPGO_DATA_PROVIDER__PASSWORD_VALIDATION__ADMINS__MIN_ENTROPY=0
      - SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN=true
      - SFTPGO_DEFAULT_ADMIN_CONFIGURED=1
      - SFTPGO_DEFAULT_ADMIN_USERNAME=admin
      - SFTPGO_DEFAULT_ADMIN_PASSWORD=admin
      - SFTPGO_LOADDATA_FROM=/etc/sftpgo/init/loaddata.json
      - SFTPGO_LOADDATA_MODE=1
      - SFTPGO_COMMON__ACTIONS__EXECUTE_ON=upload
      - SFTPGO_COMMON__ACTIONS__HOOK=/usr/local/bin/sftpgo_ingest_hook.sh

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./config/certs:/etc/nginx/certs
      - ./config/vhost:/etc/nginx/vhost.d
      - ./config/html:/usr/share/nginx/html
    labels:
      - "com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy"

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: unless-stopped
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/acme:/etc/acme.sh
    depends_on:
      - nginx-proxy
